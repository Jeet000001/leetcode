version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: leetcode_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leetcode

    ports:
      - "5433:5432"

    volumes:
      - leetcode_db_data:/var/lib/postgresql/data

volumes:
  leetcode_db_data: